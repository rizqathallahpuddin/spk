<!DOCTYPE html>
<html>
<head>
    <title>SPK Menu MBG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2 class="text-center">Sistem Pendukung Keputusan Pemilihan Menu MBG</h2>
    <p class="text-center text-muted">Berdasarkan Standar Gizi Kemenkes RI & Metode TOPSIS [cite: 171, 202]</p>
    
    <div class="text-center my-4">
        <form method="POST">
            <button type="submit" class="btn btn-primary btn-lg">Hitung Rekomendasi Menu</button>
        </form>
    </div>

    {% if results %}
    <table class="table table-bordered table-striped mt-4">
        <thead class="table-dark">
            <tr>
                <th>Ranking</th>
                <th>Menu Makanan</th>
                <th>Skor Kedekatan (RC)</th>
            </tr>
        </thead>
        <tbody>
            {% for res in results %}
            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ res.nama }}</td>
                <td>{{ res.score }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% endif %}
</body>
</html>
